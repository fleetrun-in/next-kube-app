# Canonical copy: .github/workflows/deploy.yaml
# This file is kept for reference; GitHub Actions only runs workflows under .github/workflows/.
name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  APP_NAME: next-kube-app
  K8S_NAMESPACE: next-kube-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set image tag
        run: |
          trim() { printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          is_ip() { [[ "$1" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; }

          HARBOR_REGISTRY="$(trim "${HARBOR_REGISTRY}")"
          HARBOR_PROJECT="$(trim "${HARBOR_PROJECT}")"
          HARBOR_REGISTRY="${HARBOR_REGISTRY#https://}"
          HARBOR_REGISTRY="${HARBOR_REGISTRY#http://}"
          HARBOR_REGISTRY="${HARBOR_REGISTRY%/}"

          HARBOR_HOSTNAME="$(trim "${HARBOR_HOSTNAME:-}")"
          HARBOR_HOSTNAME="${HARBOR_HOSTNAME#https://}"
          HARBOR_HOSTNAME="${HARBOR_HOSTNAME#http://}"
          HARBOR_HOSTNAME="${HARBOR_HOSTNAME%/}"
          INGRESS_HOST="$(trim "${INGRESS_HOST:-}")"

          if [[ -z "${HARBOR_REGISTRY}" || -z "${HARBOR_PROJECT}" ]]; then
            echo "HARBOR_REGISTRY and HARBOR_PROJECT must be non-empty." >&2
            exit 1
          fi

          if [[ -n "${HARBOR_HOSTNAME}" ]]; then
            HARBOR_HOST="${HARBOR_HOSTNAME}"
          elif ! is_ip "${HARBOR_REGISTRY}"; then
            HARBOR_HOST="${HARBOR_REGISTRY}"
          elif [[ -n "${INGRESS_HOST}" && "${INGRESS_HOST}" == *.* ]]; then
            INGRESS_DOMAIN="${INGRESS_HOST#*.}"
            if [[ "${INGRESS_DOMAIN}" =~ [a-zA-Z] && ! "${INGRESS_DOMAIN}" =~ ^[0-9.]+$ ]]; then
              HARBOR_HOST="harbor.${INGRESS_DOMAIN}"
              echo "Derived HARBOR_HOST=${HARBOR_HOST} from INGRESS_HOST=${INGRESS_HOST}." >&2
            fi
          fi

          if [[ -z "${HARBOR_HOST:-}" ]]; then
            echo "Could not determine Harbor hostname. Set HARBOR_HOSTNAME to the TLS cert name" >&2
            echo "(same hostname as cluster /etc/hosts, e.g. harbor.example.com)." >&2
            exit 1
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${HARBOR_HOST}/${HARBOR_PROJECT}/${APP_NAME}:${SHORT_SHA}"
          IMAGE_LATEST="${HARBOR_HOST}/${HARBOR_PROJECT}/${APP_NAME}:latest"
          {
            echo "IMAGE=${IMAGE}"
            echo "IMAGE_LATEST=${IMAGE_LATEST}"
            echo "IMAGE_TAG=${SHORT_SHA}"
            echo "HARBOR_HOST=${HARBOR_HOST}"
          } >> "${GITHUB_ENV}"
          echo "image=${IMAGE}"
        env:
          HARBOR_REGISTRY: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_HOSTNAME: ${{ secrets.HARBOR_HOSTNAME }}
          HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
          INGRESS_HOST: ${{ secrets.INGRESS_HOST }}

      - name: Configure kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          if [[ -n "${KUBECONFIG_B64:-}" ]]; then
            echo "${KUBECONFIG_B64}" | base64 -d > "${HOME}/.kube/config"
            chmod 600 "${HOME}/.kube/config"
          elif [[ -f /etc/kubernetes/admin.conf ]]; then
            cp /etc/kubernetes/admin.conf "${HOME}/.kube/config"
            chmod 600 "${HOME}/.kube/config"
          else
            echo "No kubeconfig available (set KUBECONFIG_B64 secret or run on cluster runner)" >&2
            exit 1
          fi
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

      - name: Create Harbor pull secret payload
        run: |
          AUTH="$(printf '%s:%s' "${HARBOR_USERNAME}" "${HARBOR_PASSWORD}" | base64 -w0)"
          DOCKER_CONFIG_JSON="$(printf '{"auths":{"%s":{"auth":"%s"}}}' "${HARBOR_HOST}" "${AUTH}")"
          printf '%s' "${DOCKER_CONFIG_JSON}" | base64 -w0 > /tmp/docker_config_json.b64
        env:
          HARBOR_HOST: ${{ env.HARBOR_HOST }}
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}

      - name: Render manifests
        run: |
          chmod +x scripts/render-manifests.sh
          export IMAGE="${{ env.IMAGE }}"
          export IMAGE_LATEST="${{ env.IMAGE_LATEST }}"
          export GIT_SHA="${{ github.sha }}"
          export APP_NAME="${{ env.APP_NAME }}"
          export INGRESS_HOST="${{ secrets.INGRESS_HOST }}"
          export HARBOR_HOST="${{ env.HARBOR_HOST }}"
          export HARBOR_IP="${{ secrets.HARBOR_IP }}"
          export DOCKER_CONFIG_JSON_B64="$(cat /tmp/docker_config_json.b64)"
          ./scripts/render-manifests.sh
        env:
          OUT_DIR: /tmp/next-kube-app-k8s

      - name: Build and push image in cluster
        env:
          APP_NAME: ${{ env.APP_NAME }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/next-kube-app-k8s/namespace.yaml
          kubectl apply -f /tmp/next-kube-app-k8s/rbac-cd-runner.yaml
          kubectl apply -f /tmp/next-kube-app-k8s/imagepullsecret.yaml
          kubectl delete job "${APP_NAME}-build" -n "${K8S_NAMESPACE}" --ignore-not-found
          kubectl apply -f /tmp/next-kube-app-k8s/kaniko-build-job.yaml
          kubectl wait --for=condition=complete "job/${APP_NAME}-build" -n "${K8S_NAMESPACE}" --timeout=900s
          kubectl logs "job/${APP_NAME}-build" -n "${K8S_NAMESPACE}" --all-containers=true

      - name: Deploy to cluster
        env:
          APP_NAME: ${{ env.APP_NAME }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: |
          kubectl apply -f /tmp/next-kube-app-k8s/namespace.yaml
          kubectl apply -f /tmp/next-kube-app-k8s/rbac-cd-runner.yaml
          kubectl apply -f /tmp/next-kube-app-k8s/imagepullsecret.yaml
          kubectl apply -f /tmp/next-kube-app-k8s/deployment.yaml
          kubectl apply -f /tmp/next-kube-app-k8s/service.yaml
          kubectl apply -f /tmp/next-kube-app-k8s/ingress.yaml
          kubectl rollout status "deployment/${APP_NAME}" -n "${K8S_NAMESPACE}" --timeout=300s

      - name: Deployment summary
        run: |
          echo "Image: ${{ env.IMAGE }}"
          echo "Ingress host: ${{ secrets.INGRESS_HOST }}"
          kubectl get ingress,svc,pods -n "${K8S_NAMESPACE}"
