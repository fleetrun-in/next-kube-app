apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-kube-app
  namespace: next-kube-app
  labels:
    app.kubernetes.io/name: next-kube-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: next-kube-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: next-kube-app
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: next-kube-app
          image: ${IMAGE}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
